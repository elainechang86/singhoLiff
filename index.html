<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>千慧姐姐的電子名片</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px 20px; background-color: #f4f4f4; }
        #sendBtn { 
            padding: 20px 40px; font-size: 20px; color: white; 
            background-color: #00B900; border: none; border-radius: 10px; 
            cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        #sendBtn:active { background-color: #009900; transform: translateY(2px); }
    </style>
</head>
<body>

    <h2>我的電子名片傳送器</h2>
    <p>點擊下方按鈕，選擇好友發送名片</p>
    
    <button id="sendBtn">發送名片給好友</button>

    <script>
async function main() {
    try {
        // 更新為你提供的新 ID
        await liff.init({ liffId: "2009605171-aZoIZYP7" });

        if (!liff.isLoggedIn()) {
            liff.login();
            return;
        }

        document.getElementById('sendBtn').addEventListener('click', () => {
            // 確保權限可用
            if (!liff.isApiAvailable('shareTargetPicker')) {
                alert("請至 LINE Developers 後台將 shareTargetPicker 權限設為 Allow！");
                return;
            }

            liff.shareTargetPicker([
                {
  "type": "bubble",
  "body": {
    "type": "box",
    "layout": "horizontal",
    "contents": [
      {
        "type": "image",
        "url": "https://nemo-iching.com/wp-content/uploads/2021/06/accountant-1.png",
        "size": "md",
        "aspectMode": "cover",
        "aspectRatio": "1:1",
        "gravity": "center",
        "flex": 1
      },
      {
        "type": "box",
        "layout": "vertical",
        "contents": [
          {
            "type": "text",
            "text": "王小明 (Ming)",
            "weight": "bold",
            "size": "lg",
            "color": "#111111"
          },
          {
            "type": "text",
            "text": "資深軟體工程師",
            "size": "sm",
            "color": "#666666"
          },
          {
            "type": "box",
            "layout": "vertical",
            "margin": "lg",
            "spacing": "sm",
            "contents": [
              {
                "type": "box",
                "layout": "baseline",
                "spacing": "sm",
                "contents": [
                  {
                    "type": "text",
                    "text": "公司",
                    "color": "#aaaaaa",
                    "size": "xs",
                    "flex": 2
                  },
                  {
                    "type": "text",
                    "text": "科技創意有限公司",
                    "wrap": true,
                    "color": "#333333",
                    "size": "xs",
                    "flex": 5
                  }
                ]
              }
            ]
          }
        ],
        "flex": 2,
        "paddingStart": "20px"
      }
    ],
    "paddingAll": "20px"
  },
  "footer": {
    "type": "box",
    "layout": "horizontal",
    "spacing": "md",
    "contents": [
      {
        "type": "button",
        "style": "primary",
        "color": "#06C755",
        "action": {
          "type": "uri",
          "label": "撥打電話",
          "uri": "tel:0912345678"
        }
      },
      {
        "type": "button",
        "style": "secondary",
        "action": {
          "type": "uri",
          "label": "個人網站",
          "uri": "https://line.me"
        }
      }
    ]
  }
}
            ])
            .then(res => {
                if (res) { liff.closeWindow(); }
            })
            .catch(err => alert("發送失敗: " + err));
        });

    } catch (err) {
        alert("LIFF 初始化失敗，請檢查 ID 是否正確: " + err);
    }
}
main();
    </script>
</body>
</html>
